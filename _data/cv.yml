- title: Research
  type: nested_list
  contents:
    - title: Architectural Image Production & Fine Art Printmaking
      items:
        - Examining how fine art printmaking — lithography in particular — shaped the production and public reception of American architectural images, 1978–1993.
    - title: Beginning Design Pedagogy
      items:
        - Ongoing research into digital tools, risk and certainty, and the role of representation in architectural thinking at the beginning design level.
    - title: Digital Humanities & Built Environments
      items:
        - The Digital Eagles Nest — a digital humanities course at NCCU in which students author an architectural archive of the NCCU campus using 3D scanning, photogrammetry, LiDAR, and oral history.
    - title: CLOUD Collaborative
      items:
        - Practice-based research initiative treating atmospheric clouds as a vehicle for exploring computational form, representation, and metaphor using Python, Blender, and the Alembic standard.

